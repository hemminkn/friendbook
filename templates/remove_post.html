<!DOCTYPE html>
<html>

<head>
  <title> Remove post </title>
</head>

<body>
  <h1> Remove post </h1>
  <p>Post: {{ post.title }}</p>
  <p>Are you sure you want to remove this post?</p>
  <form action="/remove_post/{{ post.id }}" method="post">
    <input type="submit" name="remove" value="Remove post">
    <input type="submit" name="back" value="Go back">
  </form>
</body>

</html>
