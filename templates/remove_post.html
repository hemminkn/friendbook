{% extends "layout.html" %}

{% block title %}Search for a post{% endblock %}

{% block content %}

<h1> Remove post </h1>
<p>Post: {{ post.title }}</p>
<p>Are you sure you want to remove this post?</p>
<form action="/remove_post/{{ post.id }}" method="post">
  <input type="submit" name="remove" value="Remove post">
  <input type="submit" name="back" value="Go back to the post">
</form>

{% endblock %}
