{% extends "layout.html" %}

{% block title %}{{ user.username }}{% endblock %}

{% block content %}

<h1>User {{ user.username }}</h1>
<p>
User has {{ posts|count }} posts.
</p>
<h2>Posts</h2>
<ul>
  {% for post in posts %}
  <li><a href="/post/{{ post.id }}">{{ post.title }}</a></li>
  {% endfor %}
</ul>

{% endblock %}
